<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Revenue Radar turns a founder's weekly brain-dump into explainable, revenue-first decisions."
    />
    <meta name="theme-color" content="#f3f0e8" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f1511" media="(prefers-color-scheme: dark)" />
    <meta property="og:title" content="Revenue Radar — Find today's Money Moves" />
    <meta
      property="og:description"
      content="Turn a messy founder brain-dump into three explainable, revenue-first decisions."
    />
    <meta property="og:type" content="website" />
    <title>Revenue Radar — Find today's Money Moves</title>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('revenue-radar-theme')
          var theme =
            stored === 'light' || stored === 'dark'
              ? stored
              : window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
          document.documentElement.dataset.theme = theme
        } catch (error) {
          document.documentElement.dataset.theme = 'light'
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
